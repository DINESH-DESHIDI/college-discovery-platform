services:
  - type: web
    name: college-platform-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postgres_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://your-vercel-frontend-url.vercel.app
      - key: PORT
        value: 10000

databases:
  - name: postgres_db
    databaseName: college_platform
    user: postgres
    region: ohio
    plan: free
